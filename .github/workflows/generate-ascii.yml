name: Generate ASCII Art

# Trigger the workflow on every push to the main branch
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual execution from the Actions tab

jobs:
  ascii-job:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repo
        uses: actions/checkout@v6

      # Step 2: Install a tool to generate ASCII art
      - name: Install Cowsay
        run: |
        #   sudo apt-get update
          sudo apt-get install -y cowsay

      # Step 3: Generate the art and write it to a file
      - name: Generate Banner
        run: |
          cowsay -f dragon "Run for cover!" >> dragon.txt
      - name: Test file exits
        run: grep -i "cover" dragon.txt

      - name: Read file
        run: cat dragon.txt

      - name Checkout Repo files
        run: ls -lart
      # Step 4: Display the file contents in the execution logs
    #   - name: Print Art to Log
    #     run: cat ascii_art.txt
